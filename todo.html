<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List App</title>
  <link rel="stylesheet" href="css/todo-style.css">
</head>
<body>
  <div class="todo-container">
    <header class="todo-header">
      <h1>My To-Do List</h1>
      <p class="subtitle">Stay organized and track your tasks</p>
    </header>

    <div class="todo-input-section">
      <div class="input-group">
        <input
          type="text"
          id="todoInput"
          class="todo-input"
          placeholder="Add a new task..."
          autofocus
        />
        <button id="addBtn" class="add-btn">Add Task</button>
      </div>
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
    </div>

    <div class="todo-stats">
      <span class="stat">Total: <strong id="totalCount">0</strong></span>
      <span class="stat">Active: <strong id="activeCount">0</strong></span>
      <span class="stat">Completed: <strong id="completedCount">0</strong></span>
    </div>

    <ul id="todoList" class="todo-list"></ul>

    <div class="todo-actions">
      <button id="clearCompleted" class="clear-btn">Clear Completed</button>
      <button id="clearAll" class="clear-btn danger">Clear All</button>
    </div>

    <div id="emptyState" class="empty-state">
      <p>No tasks yet. Add one to get started! 🚀</p>
    </div>
  </div>

  <script src="js/todo-app.js"></script>
</body>
</html>
